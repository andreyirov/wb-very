# Панель управления светом Wiren Board — сгруппировано по помещениям
title: Освещение
views:
  - title: Освещение
    path: osveshchenie
    icon: mdi:lightbulb-group-outline
    theme: wb_svet
    type: sections
    max_columns: 3
    sections:
      - type: grid
        columns: 1
        cards:
          - type: markdown
            content: |
              ## Освещение
              Управление линиями Wiren Board · MQTT `192.168.180.10`
          - type: horizontal-stack
            cards:
              - type: button
                name: Выключить всё
                icon: mdi:lightbulb-off-outline
                tap_action:
                  action: call-service
                  service: script.svet_vse_vyklyuchit
              - type: markdown
                content: |
                  {% set ns = namespace(on=0, total=0) %}
                  {% for s in states.light if not s.entity_id.startswith('sun.') %}
                    {% set ns.total = ns.total + 1 %}
                    {% if s.state == 'on' %}{% set ns.on = ns.on + 1 %}{% endif %}
                  {% endfor %}
                  **Сейчас горит:** {{ ns.on }} / {{ ns.total }}
