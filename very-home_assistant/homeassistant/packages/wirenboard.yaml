# Wiren Board MQTT — брокер 192.168.180.10 (wb8 в LAN)
# Соответствие каналов: svet.md в корне репозитория

x-wb-mdm3-defaults: &wb_mdm3_defaults
  schema: default
  brightness_scale: 100
  payload_on: "1"
  payload_off: "0"

x-wb-led-ch-defaults: &wb_led_ch_defaults
  schema: default
  brightness_scale: 100
  payload_on: "1"
  payload_off: "0"

x-wb-led-cct-defaults: &wb_led_cct_defaults
  schema: default
  brightness_scale: 100
  payload_on: "1"
  payload_off: "0"
  color_temp_kelvin: true
  color_temp_state_template: "{{ (2700 + (value | int(0)) * 38) | int }}"
  color_temp_command_template: "{{ ((value | int - 2700) / 38) | round(0) | int }}"
  supported_color_modes:
    - color_temp

mqtt:
  - broker: 192.168.180.10
    port: 1883
    discovery: false

  - light:
      # ─── Кухня (wb-led_16, wb-mdm3_175) ───
