        name: "Кухня — фартук"
        object_id: kukhnia_fartuk
        unique_id: wb_led_16_ch4
        state_topic: "/devices/wb-led_16/controls/Channel 4"
        command_topic: "/devices/wb-led_16/controls/Channel 4/on"
        brightness_state_topic: "/devices/wb-led_16/controls/Channel 4 Brightness"
        brightness_command_topic: "/devices/wb-led_16/controls/Channel 4 Brightness/on"
        device:
          name: "Кухня — фартук"
          identifiers: [["wirenboard", "wb-led_16", "ch4"]]
          manufacturer: Wiren Board
          model: WB-LED 16
          suggested_area: Кухня

