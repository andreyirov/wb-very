services:
  homeassistant:
      container_name: homeassistant
      image: "ghcr.io/home-assistant/home-assistant:stable"
      restart: unless-stopped
      network_mode: host          # <-- add this
      privileged: true
      cap_add:
        - NET_ADMIN
        - NET_RAW
      environment:
        - TZ=Europe/Moscow
      volumes:
        - ./homeassistant/:/config
        - /etc/localtime:/etc/localtime:ro
        - /run/dbus:/run/dbus:ro

