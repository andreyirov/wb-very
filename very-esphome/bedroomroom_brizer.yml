substitutions:
  device_name: "Bedroom_brizer"
  friendly_name: "Bedroom Brizer"
esphome:
  name: "${device_name}"
  friendly_name: "${friendly_name}"

esp8266:
  board: esp01_1m

#Здесь рассшифровка показания TVOC
text_sensor:
  - platform: template
    name: "TVOC Classification"
    id: tvoc_classification
    icon: "mdi:checkbox-marked-circle-outline"
    update_interval: never
    lambda: |-
      float tvoc = id(${device_name}_tvoc).state;
      if (isnan(tvoc)) {
        return {"unknown"};
      }
      int v = (int) tvoc;
      if (v <= 65) {
        return {"Воздух чистый"};
      }
      if (v <= 220) {
        return {"Рекомендуется проветрить"};
      }
      if (v <= 660) {
        return {"Рекомендуется усиленное проветривание"};
      }
      if (v <= 2200) {
        return {"Необходимо усиленное проветривание"};
      }
      if (v <= 3000) {
        return {"Умеренное загрязнение"};
      }
      if (v <= 4000) {
        return {"Сильное загрязнение"};
      }
      return {"Очень сильное загрязнение"};

